<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta property="og:title" content="그린리프 휴먼컨설팅 — 박계동"/>
  <meta property="og:description" content="자평명리학의 현대적 해석 · 맞춤형 운세상담 솔루션"/>
  <meta property="og:image" content="그린리프휴먼컨설팅.jpg"/>
  <title>그린리프 휴먼컨설팅</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --g1: #5a9e3a;
      --g2: #7fc700;
      --g3: #3d6e27;
      --pale: #eef6e8;
      --cream: #f9faf6;
      --text: #1e2a14;
      --sub: #556348;
      --gold: #c8a84b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--cream);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }

    /* 배경 원형 장식 */
    body::before {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(127,199,0,0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* 프로필 영역 */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      animation: fadeDown 0.7s ease both;
    }
    .photo-ring {
      position: relative;
      width: 96px; height: 96px;
      margin-bottom: 16px;
    }
    .photo-ring img {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 20%;
      transform: scale(1.35);
      border: 3px solid white;
      box-shadow: 0 0 0 3px var(--g2), 0 8px 32px rgba(90,158,58,0.25);
    }
    .photo-ring::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px dashed rgba(127,199,0,0.6);
      animation: spin 15s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .name-ko {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 12.5px;
      color: var(--sub);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .badge-row {
      display: flex;
      gap: 6px;
    }
    .badge {
      background: var(--pale);
      color: var(--g3);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    /* 구분선 */
    .sep {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(90,158,58,0.2), transparent);
      margin: 4px 0 20px;
    }

    /* 버튼 그룹 레이블 */
    .group-label {
      width: 100%;
      font-size: 11px;
      color: #99b08a;
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-bottom: 8px;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* 버튼 */
    .btn {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 14.5px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 9px;
      transition: all 0.22s ease;
      font-family: 'Noto Sans KR', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '›';
      position: absolute;
      right: 18px;
      font-size: 18px;
      opacity: 0.4;
    }

    /* 메인 — 상담신청 (강조) */
    .btn-cta {
      background: linear-gradient(135deg, var(--g3), var(--g1) 50%, var(--g2));
      color: white;
      height: 58px;
      font-size: 15.5px;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(90,158,58,0.38);
      margin-bottom: 20px;
    }
    .btn-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(90,158,58,0.45);
    }
    .btn-cta::after { opacity: 0.6; }

    .btn-green {
      background: white;
      color: var(--text);
      border: 1.5px solid rgba(90,158,58,0.25);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .btn-green:hover {
      background: var(--pale);
      border-color: var(--g1);
      transform: translateY(-1px);
    }

    .btn-kakao {
      background: #FEE500;
      color: #191919;
      border: none;
    }
    .btn-kakao:hover {
      background: #fdd500;
      transform: translateY(-1px);
    }

    .btn-insta {
      background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7);
      color: white;
      border: none;
    }
    .btn-insta:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn-insta::after { color: white; }

    /* 아이콘 이모지 크기 */
    .icon { font-size: 17px; }

    /* 푸터 */
    .footer {
      margin-top: 36px;
      font-size: 11.5px;
      color: #b0c2a4;
      text-align: center;
      line-height: 1.8;
    }

    /* 애니메이션 */
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-16px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .btn {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .btn:nth-child(1) { animation-delay: 0.15s; }
    .btn:nth-child(2) { animation-delay: 0.22s; }
    .btn:nth-child(3) { animation-delay: 0.29s; }
    .btn:nth-child(4) { animation-delay: 0.36s; }
    .btn:nth-child(5) { animation-delay: 0.43s; }
    .btn:nth-child(6) { animation-delay: 0.50s; }
    .btn:nth-child(7) { animation-delay: 0.57s; }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
